<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CPS LLP — Payroll Portal Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #1b3a6b 0%, #0f2347 60%, #0a1a33 100%); }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo card -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-amber-400 shadow-2xl mb-4">
        <svg class="w-10 h-10 text-blue-900" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">CPS LLP</h1>
      <p class="text-blue-200 text-sm mt-1">Corporate Personnel Services — Payroll Portal</p>
    </div>

    <!-- Login form -->
    <div class="glass rounded-2xl p-8 shadow-2xl">
      <h2 class="text-xl font-semibold text-white mb-6">Sign in to your account</h2>

      {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-500/20 border border-red-400/30 text-red-300 text-sm flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/portal/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-blue-200 mb-1">Email address</label>
          <input type="email" name="email" required placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-blue-300/50
                   focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-blue-200 mb-1">Password</label>
          <input type="password" name="password" required placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-blue-300/50
                   focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition"/>
        </div>
        <button type="submit"
          class="w-full py-3 px-6 rounded-xl bg-amber-400 hover:bg-amber-300 text-blue-900 font-bold text-base
                 transition transform hover:scale-[1.01] shadow-lg">
          Sign In
        </button>
      </form>

      <!-- Demo credentials -->
      <div class="mt-8 pt-6 border-t border-white/10">
        <p class="text-xs font-semibold text-blue-300 uppercase tracking-wider mb-3">Demo Credentials</p>
        <div class="grid gap-2">
          <button onclick="fill('admin@cpsllp.com','CPS@2024')"
            class="text-left p-3 rounded-lg glass hover:bg-white/10 transition cursor-pointer">
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold text-amber-300">CPS Admin</span>
              <span class="text-xs text-blue-400 bg-blue-900/40 px-2 py-0.5 rounded">Full Access</span>
            </div>
            <p class="text-xs text-blue-200 mt-0.5">admin@cpsllp.com / CPS@2024</p>
          </button>
          <button onclick="fill('hr@techcorp.com','Techcorp@2024')"
            class="text-left p-3 rounded-lg glass hover:bg-white/10 transition cursor-pointer">
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold text-green-300">Employer — Techcorp</span>
              <span class="text-xs text-blue-400 bg-blue-900/40 px-2 py-0.5 rounded">Company View</span>
            </div>
            <p class="text-xs text-blue-200 mt-0.5">hr@techcorp.com / Techcorp@2024</p>
          </button>
          <button onclick="fill('rajesh.kumar@techcorp.com','Rajesh@2024')"
            class="text-left p-3 rounded-lg glass hover:bg-white/10 transition cursor-pointer">
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold text-purple-300">Employee — Rajesh Kumar</span>
              <span class="text-xs text-blue-400 bg-blue-900/40 px-2 py-0.5 rounded">Self-Service</span>
            </div>
            <p class="text-xs text-blue-200 mt-0.5">rajesh.kumar@techcorp.com / Rajesh@2024</p>
          </button>
        </div>
      </div>
    </div>

    <p class="text-center text-blue-400/60 text-xs mt-6">
      © 2025 Corporate Personnel Services LLP · India Payroll &amp; Compliance
    </p>
  </div>

  <script>
    function fill(email, pw) {
      document.querySelector('input[name=email]').value = email;
      document.querySelector('input[name=password]').value = pw;
    }
  </script>
</body>
</html>
